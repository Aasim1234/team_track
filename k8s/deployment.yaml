apiVersion: apps/v1
kind: Deployment
metadata:
  name: team-tracker
  labels:
    app: team-tracker
spec:
  replicas: 2
  selector:
    matchLabels:
      app: team-tracker
  template:
    metadata:
      labels:
        app: team-tracker
    spec:
      containers:
        - name: web
          image: team-tracker:latest
          # IfNotPresent lets the locally built image be used on docker-desktop.
          # For a cloud cluster, push to a registry and reference it here.
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 80
              name: http
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 3
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 15
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 250m
              memory: 128Mi
